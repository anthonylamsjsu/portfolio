<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anthony Lam — Portfolio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="background-glow glow-1"></div>
  <div class="background-glow glow-2"></div>

  <header class="site-header">
    <div class="header-glass">
      <p class="eyebrow">Portfolio</p>
      <h1>Anthony Lam</h1>
      <p class="intro">Selected works in digital media, image-making, and object-based practice.</p>
    </div>
  </header>

  <main class="gallery">

    <article class="piece" style="--aura-color: rgba(160, 160, 160, 0.22);">
      <button class="piece-toggle" aria-expanded="false">
        <div class="piece-frame">
          <img src="images/work1.jpg" alt="Project 1" class="piece-image" />
        </div>
        <div class="piece-text glass-text">
          <h2>Project Title One</h2>
          <p class="caption">Short caption or description goes here.</p>
        </div>
      </button>

      <div class="piece-expanded">
        <div class="expanded-glass">
          <img src="images/work1.jpg" alt="Project 1 full view" class="expanded-image" />
        </div>
      </div>
    </article>

    <article class="piece" style="--aura-color: rgba(120, 170, 255, 0.22);">
      <button class="piece-toggle" aria-expanded="false">
        <div class="piece-frame">
          <img src="images/work2.jpg" alt="Project 2" class="piece-image" />
        </div>
        <div class="piece-text glass-text">
          <h2>Project Title Two</h2>
          <p class="caption">Short caption or description goes here.</p>
        </div>
      </button>

      <div class="piece-expanded">
        <div class="expanded-glass">
          <img src="images/work2.jpg" alt="Project 2 full view" class="expanded-image" />
        </div>
      </div>
    </article>

    <article class="piece" style="--aura-color: rgba(255, 130, 130, 0.20);">
      <button class="piece-toggle" aria-expanded="false">
        <div class="piece-frame">
          <img src="images/work3.jpg" alt="Project 3" class="piece-image" />
        </div>
        <div class="piece-text glass-text">
          <h2>Project Title Three</h2>
          <p class="caption">Short caption or description goes here.</p>
        </div>
      </button>

      <div class="piece-expanded">
        <div class="expanded-glass">
          <img src="images/work3.jpg" alt="Project 3 full view" class="expanded-image" />
        </div>
      </div>
    </article>

  </main>

  <script>
    const pieces = document.querySelectorAll(".piece");

    pieces.forEach((piece) => {
      const button = piece.querySelector(".piece-toggle");

      button.addEventListener("click", () => {
        const isOpen = piece.classList.contains("active");

        pieces.forEach((item) => {
          item.classList.remove("active");
          item.querySelector(".piece-toggle").setAttribute("aria-expanded", "false");
        });

        if (!isOpen) {
          piece.classList.add("active");
          button.setAttribute("aria-expanded", "true");
        }
      });
    });
  </script>
</body>
</html>
