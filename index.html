<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ANTHONY LAM — PORTFOLIO</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Doto:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="background-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
    <div class="orb orb-5"></div>
    <div class="orb orb-6"></div>
  </div>

  <header class="site-header">
    <div class="header-glass">
      <p class="eyebrow">PORTFOLIO</p>
      <h1>ANTHONY LAM</h1>
      <p class="intro">
        SELECTED WORKS IN DIGITAL MEDIA, IMAGE-MAKING, AND OBJECT-BASED PRACTICE
      </p>
    </div>
  </header>

  <main class="gallery">

    <article class="piece" style="--aura-color: rgba(160,160,160,0.22);">
      <button class="piece-toggle" aria-expanded="false">
        <div class="piece-frame">
          <img src="images/work1.jpg" alt="WORK ONE" class="piece-image" />
        </div>

        <div class="piece-text glass-text">
          <h2>PROJECT TITLE ONE</h2>
          <p class="caption">
            SHORT DESCRIPTION OR CONCEPT OF THE WORK GOES HERE
          </p>
        </div>
      </button>

      <div class="piece-expanded">
        <div class="expanded-glass">
          <img src="images/work1.jpg" alt="WORK ONE FULL VIEW" class="expanded-image" />
        </div>
      </div>
    </article>

    <article class="piece" style="--aura-color: rgba(120,170,255,0.22);">
      <button class="piece-toggle" aria-expanded="false">
        <div class="piece-frame">
          <img src="images/work2.jpg" alt="WORK TWO" class="piece-image" />
        </div>

        <div class="piece-text glass-text">
          <h2>PROJECT TITLE TWO</h2>
          <p class="caption">
            SHORT DESCRIPTION OR CONCEPT OF THE WORK GOES HERE
          </p>
        </div>
      </button>

      <div class="piece-expanded">
        <div class="expanded-glass">
          <img src="images/work2.jpg" alt="WORK TWO FULL VIEW" class="expanded-image" />
        </div>
      </div>
    </article>

    <article class="piece" style="--aura-color: rgba(255,130,130,0.20);">
      <button class="piece-toggle" aria-expanded="false">
        <div class="piece-frame">
          <img src="images/work3.jpg" alt="WORK THREE" class="piece-image" />
        </div>

        <div class="piece-text glass-text">
          <h2>PROJECT TITLE THREE</h2>
          <p class="caption">
            SHORT DESCRIPTION OR CONCEPT OF THE WORK GOES HERE
          </p>
        </div>
      </button>

      <div class="piece-expanded">
        <div class="expanded-glass">
          <img src="images/work3.jpg" alt="WORK THREE FULL VIEW" class="expanded-image" />
        </div>
      </div>
    </article>

  </main>

  <script>
    const pieces = document.querySelectorAll(".piece");

    pieces.forEach((piece) => {
      const button = piece.querySelector(".piece-toggle");

      button.addEventListener("click", () => {
        const isOpen = piece.classList.contains("active");

        pieces.forEach((item) => {
          item.classList.remove("active");
          item.querySelector(".piece-toggle").setAttribute("aria-expanded", "false");
        });

        if (!isOpen) {
          piece.classList.add("active");
          button.setAttribute("aria-expanded", "true");
        }
      });
    });
  </script>

</body>
</html>
